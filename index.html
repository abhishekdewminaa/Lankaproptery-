<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
(function() {
  // Block ALL WebSocket errors silently
  window.addEventListener(
    'unhandledrejection',
    function(e) {
      if (e && e.reason && (
        (e.reason.message && e.reason.message.toLowerCase().includes('websocket')) ||
        (e.reason.toString && e.reason.toString().toLowerCase().includes('websocket'))
      )) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
    }, true
  );

  window.addEventListener('error', function(e) {
    if (e.message && e.message.toLowerCase().includes('websocket')) {
      e.stopPropagation();
      e.preventDefault();
      return false;
    }
  }, true);

  window.onerror = function(msg) {
    if (typeof msg === 'string' && msg.toLowerCase().includes('websocket')) {
      return true;
    }
  };

  // Override console methods to hide WebSocket logs
  ['error', 'warn', 'log', 'info'].forEach(method => {
    var original = console[method];
    console[method] = function() {
      var args = Array.from(arguments);
      var str = args.map(a => {
        try {
          return (a && a.stack) ? a.stack : String(a);
        } catch(e) { return ""; }
      }).join(' ').toLowerCase();
      
      if (str.includes('websocket') || str.includes('wss://')) {
        return;
      }
      original.apply(console, arguments);
    };
  });
})();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
