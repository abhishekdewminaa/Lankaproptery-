<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // We try to prevent libraries from attempting to overwrite window.fetch.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            // Some polyfills check if fetch is a "native" function by looking at toString.
            // We just ensure it's accessible through globalThis too.
            if (typeof globalThis !== 'undefined' && !globalThis.fetch) {
              globalThis.fetch = originalFetch;
            }
            
            // Try to add a dummy setter to Window prototype if possible to swallow assignments
            const proto = Object.getPrototypeOf(window);
            if (proto && Object.getOwnPropertyDescriptor(proto, 'fetch')) {
               // Already a getter on prototype? Good.
            } else {
               // Try to define on instance if not already there
               const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
               if (!desc || desc.configurable) {
                 Object.defineProperty(window, 'fetch', {
                   get: () => originalFetch,
                   set: () => { console.warn('Blocked attempt to overwrite read-only fetch'); },
                   configurable: true,
                   enumerable: true
                 });
               }
            }
          }
        } catch (e) {
          console.debug("Fetch guard info:", e.message);
        }
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }

    </script>
  </body>
</html>
