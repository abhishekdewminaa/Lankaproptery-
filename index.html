<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var origError = window.onerror
        window.onerror = function(msg) {
          if (typeof msg === 'string' && 
              msg.indexOf('WebSocket') > -1) {
            return true
          }
          return origError ? 
            origError.apply(this, arguments) : false
        }
        window.addEventListener(
          'unhandledrejection', 
          function(event) {
            if (event.reason && 
                event.reason.message && 
                event.reason.message
                  .indexOf('WebSocket') > -1) {
              event.preventDefault()
              event.stopPropagation()
            }
          }, 
          true
        )
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
