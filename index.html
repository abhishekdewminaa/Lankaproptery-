<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LankaProperty.lk - Sri Lanka's #1 Real Estate Marketplace</title>
    <script>
;(function(){
  var _onerror = window.onerror
  window.onerror = function(msg){
    if(typeof msg === 'string' && 
       msg.indexOf('WebSocket') > -1){
      return true
    }
    return _onerror ? 
      _onerror.apply(this, arguments) : false
  }
  window.addEventListener(
    'unhandledrejection',
    function(e){
      var msg = e.reason?.message || ''
      if(msg.indexOf('WebSocket') > -1 ||
         msg.indexOf('websocket') > -1){
        e.preventDefault()
        e.stopImmediatePropagation()
      }
    }, true
  )
  var _consoleError = console.error
  console.error = function(){
    var str = Array.from(arguments).join(' ')
    if(str.indexOf('WebSocket') > -1 ||
       str.indexOf('websocket') > -1){
      return
    }
    _consoleError.apply(console, arguments)
  }
})()
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
