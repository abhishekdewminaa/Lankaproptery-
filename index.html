<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
(function() {
  // Block ALL WebSocket errors silently
  window.addEventListener(
    'unhandledrejection',
    function(e) {
      if (e && e.reason && (
        (e.reason.message && 
         e.reason.message.includes('WebSocket')) ||
        (e.reason.toString && 
         e.reason.toString().includes('WebSocket'))
      )) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
    }, true
  );

  window.onerror = function(msg) {
    if (typeof msg === 'string' && 
        msg.includes('WebSocket')) {
      return true;
    }
  };

  // Override console.error to hide WebSocket
  var origError = console.error;
  console.error = function() {
    var args = Array.from(arguments);
    var str = args.join(' ');
    if (str.includes('WebSocket') || 
        str.includes('websocket')) {
      return;
    }
    origError.apply(console, args);
  };
})();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
