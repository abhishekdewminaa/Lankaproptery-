<!doctype html>
<html lang="en">
  <head>
    <script>
    /* SUPPRESSION - MUST BE FIRST */
    ;(function(){
      var _warn = console.warn
      console.warn = function() {
        var msg = Array.from(arguments).join(' ')
        if (
          msg.indexOf('width') > -1 ||
          msg.indexOf('height') > -1 ||
          msg.indexOf('greater than 0') > -1 ||
          msg.indexOf('chart') > -1 ||
          msg.indexOf('Chart') > -1 ||
          msg.indexOf('WebSocket') > -1 ||
          msg.indexOf('websocket') > -1 ||
          msg.indexOf('vite') > -1 ||
          msg.indexOf('ResponsiveContainer') > -1
        ) {
          return
        }
        _warn.apply(console, arguments)
      }
      var _error = console.error
      console.error = function() {
        var msg = Array.from(arguments).join(' ')
        if (
          msg.indexOf('WebSocket') > -1 ||
          msg.indexOf('websocket') > -1 ||
          msg.indexOf('width') > -1 ||
          msg.indexOf('height') > -1 ||
          msg.indexOf('greater than 0') > -1 ||
          msg.indexOf('vite') > -1
        ) {
          return
        }
        _error.apply(console, arguments)
      }
      window.addEventListener(
        'unhandledrejection',
        function(e) { e.preventDefault() }, 
        true
      )
    })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
