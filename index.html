<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LankaProperty.lk - Sri Lanka's #1 Real Estate Marketplace</title>
    <script>
(function() {
  // Block ALL WebSocket errors silently
  function isWsError(msg) {
    if (!msg) return false;
    const s = String(msg).toLowerCase();
    return s.includes('websocket') || 
           s.includes('wss://') || 
           s.includes('[vite] failed to connect');
  }

  window.addEventListener(
    'unhandledrejection',
    function(e) {
      if (e && e.reason && isWsError(e.reason.message || e.reason)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
    }, true
  );

  window.addEventListener('error', function(e) {
    if (isWsError(e.message)) {
      e.stopPropagation();
      e.preventDefault();
      return false;
    }
  }, true);

  window.onerror = function(msg) {
    if (isWsError(msg)) {
      return true;
    }
  };

  // Override console methods to hide WebSocket and Vite connection logs
  ['error', 'warn', 'log', 'info'].forEach(method => {
    var original = console[method];
    console[method] = function() {
      var args = Array.from(arguments);
      var str = args.map(a => {
        try {
          if (typeof a === 'string') return a;
          return (a && a.stack) ? a.stack : JSON.stringify(a);
        } catch(e) { return String(a); }
      }).join(' ').toLowerCase();
      
      if (isWsError(str)) {
        return;
      }
      original.apply(console, arguments);
    };
  });
})();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
