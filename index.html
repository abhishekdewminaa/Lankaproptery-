<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
(function() {
  // Suppress WebSocket errors in preview
  var origOnError = window.onerror;
  window.onerror = function(msg, src, line, col, err) {
    if (typeof msg === 'string' && 
        msg.toLowerCase().indexOf('websocket') > -1) {
      return true;
    }
    return origOnError ? 
      origOnError(msg, src, line, col, err) : false;
  };
  
  window.addEventListener('unhandledrejection', 
    function(event) {
      if (event.reason && (
        (event.reason.message && 
         event.reason.message
           .toLowerCase()
           .indexOf('websocket') > -1) ||
        (typeof event.reason === 'string' && 
         event.reason
           .toLowerCase()
           .indexOf('websocket') > -1)
      )) {
        event.preventDefault();
        event.stopImmediatePropagation();
      }
    }, true
  );
})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Prevent fetch overwrite errors
      (function() {
        try {
          const nativeFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => {},
            configurable: false
          });
        } catch(e) {}
      })();

      // Fix for "undefined" is not valid JSON
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (localStorage.getItem(key) === "undefined") {
            console.warn(`Removing invalid 'undefined' value from localStorage key: ${key}`);
            localStorage.removeItem(key);
          }
        }
      } catch (e) {
        console.error("Error clearing localStorage:", e);
      }
    </script>
  </body>
</html>
